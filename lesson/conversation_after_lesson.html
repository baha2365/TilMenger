<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice with Emma — LinguaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #F5F0E8;
      --ink:     #1A1612;
      --rust:    #C4572A;
      --sage:    #4A6741;
      --gold:    #D4A853;
      --muted:   #7A6E65;
      --border:  #DDD5C8;
      --card-bg: #FDFAF5;
      --emma:    #2D5A8E;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); }

    /* ── Navbar ── */
    .navbar { background: var(--ink); padding: 0.9rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.25rem; text-decoration: none; letter-spacing: -0.02em; }
    .nav-brand span { color: var(--gold); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-avatar { width: 36px; height: 36px; background: var(--rust); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 0.9rem; }
    .btn-back { background: none; border: 1px solid rgba(255,255,255,0.2); color: #9A9089; padding: 0.35rem 0.9rem; border-radius: 7px; font-size: 0.8rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem; transition: all 0.2s; }
    .btn-back:hover { border-color: rgba(255,255,255,0.5); color: var(--cream); }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 268px 1fr; height: calc(100vh - 56px); }

    /* ── Sidebar ── */
    .sidebar { background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 1.4rem 1.4rem 1rem; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--ink); margin-bottom: 0.25rem; }
    .sidebar-header p { font-size: 0.75rem; color: var(--muted); }
    .words-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .word-card { background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; transition: all 0.3s; }
    .word-card.active-word { border-color: var(--rust); background: rgba(196,87,42,0.05); box-shadow: 0 0 0 3px rgba(196,87,42,0.1); }
    .word-card.practiced { background: rgba(74,103,65,0.07); border-color: var(--sage); }
    .word-card .eng { font-weight: 600; font-size: 0.95rem; color: var(--ink); display: flex; align-items: center; gap: 0.4rem; }
    .word-card .eng .check { color: var(--sage); font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; }
    .word-card.practiced .eng .check { opacity: 1; }
    .word-card .kaz { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .level-badge { margin: 1rem; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; text-align: center; }
    .level-badge.beginner      { background: rgba(74,103,65,0.12);  color: var(--sage); }
    .level-badge.intermediate  { background: rgba(212,168,83,0.15); color: #A07820; }
    .level-badge.advanced      { background: rgba(45,90,142,0.12);  color: var(--emma); }

    /* ── Chat area ── */
    .chat-area { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .chat-topbar { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--card-bg); display: flex; align-items: center; gap: 1rem; }
    .emma-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, var(--emma), #4A8ABE); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; box-shadow: 0 2px 10px rgba(45,90,142,0.3); }
    .emma-info h3 { font-weight: 600; font-size: 0.95rem; color: var(--ink); }
    .emma-info p { font-size: 0.75rem; color: var(--muted); }
    .emma-status { width: 8px; height: 8px; background: #34C759; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* ── Word prompt banner ── */
    .word-prompt {
      margin: 1rem 1.5rem 0;
      padding: 1rem 1.3rem;
      background: var(--ink);
      border-radius: 14px;
      display: none;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      transition: background 0.4s;
    }
    .word-prompt::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(212,168,83,0.2) 0%, transparent 70%); }
    .word-prompt-icon { font-size: 1.5rem; flex-shrink: 0; }
    .word-prompt-text { flex: 1; position: relative; z-index: 1; }
    .word-prompt-kz   { font-size: 0.78rem; color: #9A9089; margin-bottom: 0.3rem; }
    .word-prompt-word { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); letter-spacing: -0.01em; }
    .word-prompt-counter { font-size: 0.72rem; color: #6A6260; margin-top: 0.2rem; }
    .word-prompt.done { background: linear-gradient(135deg, var(--sage), #3a5633); }
    .word-prompt.done .word-prompt-kz   { color: rgba(255,255,255,0.7); }
    .word-prompt.done .word-prompt-word { color: #fff; font-size: 1rem; }

    /* ── Messages ── */
    .messages { flex: 1; overflow-y: auto; padding: 1rem 1.5rem 1.2rem; display: flex; flex-direction: column; gap: 0.9rem; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 0.7rem; max-width: 80%; }
    .msg.user      { align-self: flex-end;   flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; margin-top: 2px; }
    .msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--emma), #4A8ABE); color: #fff; }
    .msg.user .msg-avatar      { background: var(--rust); color: #fff; font-weight: 600; font-size: 0.8rem; }

    .bubble { padding: 0.75rem 1rem; border-radius: 16px; font-size: 0.88rem; line-height: 1.55; word-break: break-word; animation: popIn 0.2s ease; }
    @keyframes popIn { from { opacity:0; transform:translateY(6px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    .msg.assistant .bubble { background: #fff; color: var(--ink); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .msg.user .bubble { background: var(--rust); color: #fff; border-bottom-right-radius: 4px; }
    .word-highlight { display: inline-block; background: rgba(45,90,142,0.1); color: var(--emma); font-weight: 600; padding: 0 4px; border-radius: 4px; }

    /* Suggestion */
    .suggestion-wrap { align-self: flex-start; margin-left: 38px; display: flex; flex-direction: column; align-items: flex-start; gap: 3px; animation: popIn 0.2s ease; }
    .suggestion-label { font-size: 11px; color: var(--muted); }
    .suggestion-bubble { background: #FFFBEE; border: 1.5px solid var(--gold); border-radius: 10px; padding: 0.55rem 0.85rem; font-size: 0.82rem; color: var(--ink); max-width: 380px; }

    /* System note */
    .system-note { align-self: center; background: rgba(0,0,0,0.05); color: var(--muted); font-size: 0.75rem; padding: 5px 14px; border-radius: 20px; text-align: center; animation: popIn 0.2s ease; max-width: 90%; }

    /* Typing */
    .typing-indicator { display: flex; gap: 0.7rem; align-self: flex-start; align-items: flex-end; }
    .typing-indicator .msg-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--emma), #4A8ABE); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #fff; }
    .typing-dots { background: #fff; border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 4px; }
    .typing-dots span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-5px);} }

    /* ── Input area ── */
    .input-area { padding: 0.9rem 1.5rem; border-top: 1px solid var(--border); background: var(--card-bg); display: flex; gap: 0.7rem; align-items: flex-end; }
    .input-wrap { flex: 1; background: var(--cream); border: 1.5px solid var(--border); border-radius: 13px; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.9rem; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--emma); }
    .input-wrap textarea { flex: 1; background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink); resize: none; max-height: 90px; line-height: 1.5; }
    .input-wrap textarea::placeholder { color: var(--muted); }
    .input-wrap textarea:disabled { opacity: 0.5; }
    .btn-mic { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--cream); color: var(--muted); font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .btn-mic:hover { background: var(--border); color: var(--ink); }
    .btn-mic.recording { background: #FF3B30; color: #fff; animation: pulseRed 1s ease infinite; }
    @keyframes pulseRed { 0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,0.4);} 50%{box-shadow:0 0 0 8px rgba(255,59,48,0);} }
    .btn-send { width: 42px; height: 42px; border-radius: 11px; border: none; background: var(--emma); color: #fff; font-size: 1.05rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .btn-send:hover { background: #1E4B7A; transform: scale(1.05); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Status ── */
    .status-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; color: var(--muted); font-size: 0.9rem; }
    .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--rust); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../dashboard.html" class="nav-brand">Lingua<span>AI</span></a>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar">…</div>
    <a href="vocabulary.html" class="btn-back">← Vocabulary</a>
  </div>
</nav>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Бүгінгі сөздер</h2>
      <p id="partLabel">Part —</p>
    </div>
    <div class="words-list" id="wordsList"></div>
    <div class="level-badge" id="levelBadge">—</div>
  </aside>

  <!-- Chat -->
  <section class="chat-area">
    <div class="chat-topbar">
      <div class="emma-avatar">👩‍🏫</div>
      <div class="emma-info">
        <h3>Emma</h3>
        <p><span class="emma-status"></span>Your AI English Teacher</p>
      </div>
    </div>

    <!-- Word prompt banner (Kazakh, hardcoded) -->
    <div class="word-prompt" id="wordPrompt">
      <div class="word-prompt-icon" id="promptIcon">✏️</div>
      <div class="word-prompt-text">
        <div class="word-prompt-kz" id="promptKz">Төмендегі сөзді қолданып ағылшынша сөйлем жазыңыз:</div>
        <div class="word-prompt-word" id="promptWord">—</div>
        <div class="word-prompt-counter" id="promptCounter"></div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="status-screen" id="loadingScreen">
        <div class="spinner"></div>
        <span>Жүктелуде…</span>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Ағылшынша сөйлем жазыңыз…" rows="1" onInput="autoResize(this)" disabled></textarea>
        <button class="btn-mic" id="micBtn" title="Дауыспен жазу">🎤</button>
      </div>
      <button class="btn-send" id="sendBtn" disabled title="Жіберу">➤</button>
    </div>
  </section>

</div>

<script>
  /* ────────────────────────────────────────────
     Config
  ──────────────────────────────────────────── */
  const API_AUTH    = 'http://localhost:3030/api/auth';
  const API_CHAT    = 'http://localhost:8000/chat';
  const API_SUGGEST = 'http://localhost:8000/suggest';
  const token       = localStorage.getItem('token');
  if (!token) window.location.href = 'index.html';

  /* ────────────────────────────────────────────
     State
  ──────────────────────────────────────────── */
  let session        = null;
  let userLevel      = '';
  let userAvatar     = '?';
  let currentWordIdx = 0;
  let attemptCount   = 0;
  let isBusy         = false;
  const MAX_ATTEMPTS = 2; // after N wrong tries, move on automatically

  /* ────────────────────────────────────────────
     Init
  ──────────────────────────────────────────── */
  async function init() {
    try {
      const res  = await fetch(`${API_AUTH}/me`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok || !data.success) { window.location.href = 'index.html'; return; }
      userAvatar = data.user.name[0].toUpperCase();
      document.getElementById('navAvatar').textContent = userAvatar;
      userLevel = resolveLevel(data.user.level);
    } catch {
      window.location.href = 'index.html';
      return;
    }

    const raw = localStorage.getItem('vocabSession');
    if (!raw) {
      showError('Сабақ деректері табылмады. Алдымен vocabulary бетіне өтіңіз.');
      return;
    }
    session = JSON.parse(raw);

    renderSidebar();
    document.getElementById('loadingScreen').remove();
    document.getElementById('wordPrompt').style.display = 'flex';

    showCurrentWordPrompt();
    enableInput();
  }

  function resolveLevel(s) {
    if (!s) return 'beginner';
    const l = s.toLowerCase();
    if (l.includes('c1') || l.includes('c2') || l.includes('advanced'))    return 'advanced';
    if (l.includes('b1') || l.includes('b2') || l.includes('intermediate')) return 'intermediate';
    return 'beginner';
  }

  /* ────────────────────────────────────────────
     Sidebar
  ──────────────────────────────────────────── */
  function renderSidebar() {
    document.getElementById('partLabel').textContent = `Part ${session.partNumber}`;
    const labels = { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' };
    const badge  = document.getElementById('levelBadge');
    badge.textContent = labels[userLevel] || 'Beginner';
    badge.className   = `level-badge ${userLevel}`;

    const list = document.getElementById('wordsList');
    list.innerHTML = '';
    session.words.forEach((w, i) => {
      const el = document.createElement('div');
      el.className = 'word-card';
      el.id = `wc-${i}`;
      el.innerHTML = `<div class="eng">${w.english} <span class="check">✓</span></div><div class="kaz">${w.kazakh}</div>`;
      list.appendChild(el);
    });
    refreshSidebarState();
  }

  function refreshSidebarState() {
    session.words.forEach((_, i) => {
      const el = document.getElementById(`wc-${i}`);
      if (!el) return;
      el.classList.remove('active-word', 'practiced');
      if (i < currentWordIdx)       el.classList.add('practiced');
      else if (i === currentWordIdx) el.classList.add('active-word');
    });
  }

  /* ────────────────────────────────────────────
     Word prompt banner (Kazakh UI — not AI)
  ──────────────────────────────────────────── */
  function showCurrentWordPrompt() {
    if (currentWordIdx >= session.words.length) {
      showAllDone();
      return;
    }

    const w = session.words[currentWordIdx];
    attemptCount = 0;

    // Update banner
    const banner = document.getElementById('wordPrompt');
    banner.className = 'word-prompt';
    document.getElementById('promptIcon').textContent    = '✏️';
    document.getElementById('promptKz').textContent      = 'Төмендегі сөзді қолданып ағылшынша сөйлем жазыңыз:';
    document.getElementById('promptWord').textContent    = `« ${w.english} »`;
    document.getElementById('promptCounter').textContent = `${currentWordIdx + 1} / ${session.words.length} сөз`;

    refreshSidebarState();

    // System note in Kazakh (not AI generated)
    appendSystemNote(
      `${currentWordIdx + 1}-сөз: «${w.english}» (қазақша: ${w.kazakh})`
    );
  }

  function showAllDone() {
    const banner = document.getElementById('wordPrompt');
    banner.className = 'word-prompt done';
    document.getElementById('promptIcon').textContent    = '✅';
    document.getElementById('promptKz').textContent      = 'Барлық сөздерді жаттадыңыз!';
    document.getElementById('promptWord').textContent    = '🎉 Тамаша жұмыс!';
    document.getElementById('promptCounter').textContent = '';

    disableInput();
    document.getElementById('userInput').disabled = true;
    document.getElementById('micBtn').disabled    = true;

    refreshSidebarState();
    appendSystemNote('Барлық сөздерден сөйлем жаздыңыз! Vocabulary бетіне оралып, жаттығуды жалғастыра аласыз.');
  }

  /* ────────────────────────────────────────────
     Send message
  ──────────────────────────────────────────── */
  async function sendMessage() {
    const textarea = document.getElementById('userInput');
    const text     = textarea.value.trim();
    if (!text || isBusy || currentWordIdx >= session.words.length) return;

    textarea.value = '';
    autoResize(textarea);
    attemptCount++;

    appendBubble('user', text);
    checkGrammar(text);           // parallel, fire & forget
    await getEmmaFeedback(text);
  }

  /* ────────────────────────────────────────────
     AI feedback (Emma checks the sentence)
  ──────────────────────────────────────────── */
  async function getEmmaFeedback(userSentence) {
    const word = session.words[currentWordIdx];

    const levelMap = {
      beginner:     'The student is a BEGINNER. Use very simple English. Keep feedback to 1-2 short sentences. Be very encouraging.',
      intermediate: 'The student is INTERMEDIATE. Give natural feedback in 2-3 sentences.',
      advanced:     'The student is ADVANCED. Give concise, nuanced feedback in 2-3 sentences. Mention collocations or style if relevant.',
    };

    const systemPrompt =
      `You are Emma, a warm English teacher. The student is practicing the word "${word.english}".

Their sentence: "${userSentence}"

Your task:
1. Check whether the student used the word "${word.english}" (or its correct grammatical form) in a meaningful, correct sentence.
2. If they used it correctly: praise them in one sentence, then give one example sentence yourself using "${word.english}".
3. If they did NOT use the word, or used it incorrectly: gently say so, correct the mistake, and show the correct usage in one example sentence.
4. ${levelMap[userLevel]}

FORMAT RULES: Plain sentences only. No bullet points, no asterisks, no markdown. Maximum 3 sentences total. Be warm and brief.`;

    const wordUsedCorrectly = userSentence.toLowerCase().includes(word.english.toLowerCase());

    showTyping();
    isBusy = true;
    disableInput();

    try {
      const res = await fetch(API_CHAT, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: userSentence, system: systemPrompt }),
      });

      removeTyping();
      const bubble  = appendBubble('assistant', '');
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   reply   = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        decoder.decode(value, { stream: true }).split('\n').filter(l => l.trim()).forEach(line => {
          try {
            const obj = JSON.parse(line);
            if (obj.message?.content) {
              reply += obj.message.content;
              bubble.innerHTML = highlightWord(reply, word.english);
              scrollToBottom();
            }
          } catch {}
        });
      }

      // Advance to next word when: word was used correctly OR max attempts reached
      if (wordUsedCorrectly || attemptCount >= MAX_ATTEMPTS) {
        currentWordIdx++;
        setTimeout(showCurrentWordPrompt, 600);
      }
      // else: stay on same word, user tries again

    } catch {
      removeTyping();
      appendBubble('assistant', 'Қосылу қатесі. Қайтадан көріңіз!');
    }

    isBusy = false;
    if (currentWordIdx < session.words.length) enableInput();
  }

  /* ────────────────────────────────────────────
     Grammar suggestion (/suggest)
  ──────────────────────────────────────────── */
  async function checkGrammar(text) {
    try {
      const res  = await fetch(API_SUGGEST, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();
      if (!data.correct && data.corrected) {
        const wrap = document.createElement('div');
        wrap.className = 'suggestion-wrap';
        wrap.innerHTML = `
          <div class="suggestion-label">💡 Грамматикалық ескерту:</div>
          <div class="suggestion-bubble">${data.corrected}</div>`;
        document.getElementById('messages').appendChild(wrap);
        scrollToBottom();
      }
    } catch {}
  }

  /* ────────────────────────────────────────────
     DOM helpers
  ──────────────────────────────────────────── */
  function appendBubble(role, html) {
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg ${role}`;
    const av  = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'assistant' ? '👩‍🏫' : userAvatar;
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;
    row.appendChild(av);
    row.appendChild(bub);
    messages.appendChild(row);
    scrollToBottom();
    return bub;
  }

  function appendSystemNote(text) {
    const el = document.createElement('div');
    el.className = 'system-note';
    el.textContent = text;
    document.getElementById('messages').appendChild(el);
    scrollToBottom();
  }

  function highlightWord(text, word) {
    if (!word) return text;
    const re = new RegExp(`\\b(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})\\b`, 'gi');
    return text.replace(re, '<span class="word-highlight">$1</span>');
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const ti = document.createElement('div');
    ti.className = 'typing-indicator';
    ti.id = 'typingIndicator';
    ti.innerHTML = `<div class="msg-avatar">👩‍🏫</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    messages.appendChild(ti);
    scrollToBottom();
  }
  function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

  function enableInput() {
    document.getElementById('userInput').disabled = false;
    document.getElementById('sendBtn').disabled   = false;
    document.getElementById('userInput').focus();
  }
  function disableInput() { document.getElementById('sendBtn').disabled = true; }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }
  function scrollToBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
  function showError(msg)   { document.getElementById('loadingScreen').innerHTML = `<span style="font-size:2rem">⚠️</span><span>${msg}</span>`; }

  /* ────────────────────────────────────────────
     Events
  ──────────────────────────────────────────── */
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── Voice recognition ── */
  window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('micBtn');
  if (window.SpeechRecognition) {
    const recognition          = new SpeechRecognition();
    recognition.lang           = 'en-US';
    recognition.continuous     = false;
    recognition.interimResults = true;
    let isRecording            = false;
    micBtn.addEventListener('click', () => {
      if (!isRecording) { recognition.start(); isRecording = true; micBtn.classList.add('recording'); micBtn.textContent = '⏹️'; }
      else recognition.stop();
    });
    recognition.onresult = e => {
      let t = '';
      for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
      document.getElementById('userInput').value = t;
    };
    recognition.onend = () => { isRecording = false; micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; };
  } else {
    micBtn.style.display = 'none';
  }

  /* ── Start ── */
  init();
</script>
</body>
</html>
