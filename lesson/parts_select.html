<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TilMenger — Learning Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #58CC02;
      --green-dark:  #46A302;
      --green-pale:  #E8F9D4;
      --orange:      #FF9600;
      --orange-dark: #CC7A00;
      --orange-pale: #FFF3D9;
      --gray:        #D6D6D6;
      --gray-dark:   #ABABAB;
      --gray-pale:   #F2F2F2;
      --navy:        #1C1D3E;
      --bg:          #FFFFFF;
      --ink:         #3C3C3C;
      --muted:       #ABABAB;
      --border:      #E5E5E5;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--navy);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid rgba(88,204,2,0.25);
    }
    .nav-brand {
      font-weight: 900;
      color: white;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      text-decoration: none;
    }
    .nav-brand span { color: var(--green); }
    .nav-right { display: flex; align-items: center; gap: 0.9rem; }
    .nav-avatar {
      width: 36px; height: 36px;
      background: var(--orange);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900; font-size: 0.9rem;
      border: 2px solid var(--orange-dark);
    }
    .btn-back {
      background: none;
      border: 2px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.65);
      padding: 0.38rem 1rem;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.35rem;
    }
    .btn-back:hover { border-color: rgba(255,255,255,0.45); color: white; }

    .main { max-width: 500px; margin: 0 auto; padding: 2.2rem 1.5rem 5rem; }

    /* ── Page header ── */
    .page-header { margin-bottom: 1.5rem; text-align: center; }
    .page-header h1 {
      font-weight: 900;
      font-size: clamp(1.55rem, 4vw, 2rem);
      color: var(--ink);
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }
    .page-header h1 em { color: var(--orange); font-style: normal; }
    .page-header p { font-size: 0.85rem; color: var(--muted); font-weight: 700; }

    /* ── Progress card ── */
    .progress-wrap {
      background: var(--green-pale);
      border: 2px solid #A3E063;
      border-radius: 16px;
      padding: 1rem 1.3rem;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 70px;
      z-index: 50;
      box-shadow: 0 4px 0 rgba(70,163,2,0.15);
    }
    .progress-info { flex: 1; }
    .progress-label {
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--green-dark);
      margin-bottom: 0.45rem;
    }
    .progress-bar-bg {
      height: 10px;
      background: rgba(70,163,2,0.18);
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 5px;
      transition: width 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
      width: 0%;
      position: relative;
    }
    .progress-bar-fill::after {
      content: '';
      position: absolute;
      right: 4px; top: 2px;
      width: 3px; height: 6px;
      background: rgba(255,255,255,0.5);
      border-radius: 2px;
    }
    .progress-count {
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--green-dark);
      white-space: nowrap;
      text-align: center;
      line-height: 1.1;
    }
    .progress-count span {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--green);
      display: block;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .jump-current {
      flex-shrink: 0;
      background: var(--green);
      color: white;
      border: none;
      border-bottom: 3px solid var(--green-dark);
      border-radius: 10px;
      padding: 0.5rem 0.9rem;
      font-size: 0.72rem;
      font-weight: 900;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.1s, border-bottom-width 0.1s;
      line-height: 1.4;
    }
    .jump-current:hover { opacity: 0.9; }
    .jump-current:active { transform: translateY(2px); border-bottom-width: 1px; }

    /* ── Status screen ── */
    .status-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 50vh; gap: 1rem;
      color: var(--muted); font-size: 0.9rem; font-weight: 700;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-retry {
      padding: 0.55rem 1.5rem;
      background: var(--green);
      color: white;
      border: none;
      border-bottom: 3px solid var(--green-dark);
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 900;
      cursor: pointer;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 3rem 1.5rem;
      color: var(--muted); font-size: 0.9rem; font-weight: 700;
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; display: block; }

    /* ══════════════════════════════════════════
       ZIGZAG NODE TRACK
    ══════════════════════════════════════════ */
    .part-track {
      display: flex;
      flex-direction: column;
      gap: 2.4rem;
      padding: 1rem 0 1rem;
    }

    .part-node {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      animation: fadeUp 0.3s ease both;
    }

    .part-node:nth-child(odd) {
      flex-direction: row;
      padding-left: 10%;
    }
    .part-node:nth-child(even) {
      flex-direction: row-reverse;
      padding-right: 10%;
    }
    .part-node:nth-child(even) .node-info { text-align: right; }
    .part-node:nth-child(even) .node-tags { justify-content: flex-end; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Node button wrapper ── */
    .node-btn-wrap {
      position: relative;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Give the wrap a fixed size so the absolute SVG has a stable anchor */
      width: 76px;
      height: 76px;
    }

    /* ── 3D circle button ── */
    .node-btn {
      width: 76px; height: 76px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem;
      border: none;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      position: relative;
      z-index: 1;
      outline: 4px solid rgba(255,255,255,0.35);
      outline-offset: -6px;
    }
    .node-btn:focus-visible { outline: 3px solid var(--orange); outline-offset: 3px; }

    /* COMPLETED — green */
    .part-node.is-completed .node-btn {
      background: var(--green);
      box-shadow: 0 7px 0 var(--green-dark), 0 10px 18px rgba(70,163,2,0.2);
      color: white;
    }
    .part-node.is-completed .node-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 9px 0 var(--green-dark), 0 12px 22px rgba(70,163,2,0.28);
    }
    .part-node.is-completed .node-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 var(--green-dark);
    }

    /* CURRENT — orange */
    .part-node.is-current .node-btn {
      background: var(--orange);
      box-shadow: 0 7px 0 var(--orange-dark), 0 10px 18px rgba(204,122,0,0.22);
      color: white;
    }
    .part-node.is-current .node-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 9px 0 var(--orange-dark), 0 12px 22px rgba(204,122,0,0.32);
    }
    .part-node.is-current .node-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 var(--orange-dark);
    }

    /* LOCKED — gray */
    .part-node.is-locked .node-btn {
      background: var(--gray);
      box-shadow: 0 7px 0 var(--gray-dark), 0 10px 16px rgba(0,0,0,0.05);
      color: var(--gray-dark);
      cursor: not-allowed;
      font-size: 1.35rem;
    }
    .part-node.is-locked .node-btn:active {
      transform: none;
      box-shadow: 0 7px 0 var(--gray-dark);
    }

    /* ── Bouncing START badge above current node ── */
    .start-badge {
      position: absolute;
      bottom: calc(100% + 11px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--orange);
      color: white;
      font-weight: 900;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 0.26rem 0.72rem;
      border-radius: 20px;
      border-bottom: 2px solid var(--orange-dark);
      white-space: nowrap;
      animation: badgeBounce 1.6s ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }
    .start-badge::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--orange-dark);
    }
    @keyframes badgeBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-5px); }
    }

    /* ── Arc ring (three task-progress segments around each node button) ── */
    /*
       Arc 1 (top-right,  10°→110°) = Vocabulary / word learning
       Arc 2 (bottom,    130°→230°) = Sentence builder
       Arc 3 (top-left,  250°→350°) = Pronunciation
       Green = done, Gray = not yet done.
    */
    .arc-ring {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      overflow: visible;
      z-index: 0;
      /* width/height set via attributes (108px); only override on mobile */
    }
    @media (max-width: 480px) {
      /* Scale the SVG down proportionally for the 62px mobile button */
      .arc-ring { width: 88px; height: 88px; }
    }

    /* ── Node info text ── */
    .node-info { flex: 1; min-width: 0; }
    .node-eyebrow {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.18rem;
    }
    .part-node.is-completed .node-eyebrow { color: var(--green-dark); }
    .part-node.is-current   .node-eyebrow { color: var(--orange); }

    .node-title {
      font-weight: 900;
      font-size: 1rem;
      color: var(--ink);
      line-height: 1.2;
    }
    .part-node.is-locked .node-title { color: var(--muted); }

    .node-tags {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
    }
    .tag-xp    { background: var(--green-pale);  color: var(--green-dark); }
    .tag-words { background: #EEF2FF;             color: #6366F1; }
    .part-node.is-locked  .tag-xp { background: var(--gray-pale);   color: var(--gray-dark); }
    .part-node.is-current .tag-xp { background: var(--orange-pale); color: var(--orange-dark); }

    /* ── Mobile: tighten the offset and shrink button ── */
    @media (max-width: 480px) {
      .navbar { padding: 0.9rem 1rem; }
      .progress-wrap { top: 64px; }
      .node-btn { width: 62px; height: 62px; font-size: 1.5rem; }
      .node-btn-wrap { width: 62px; height: 62px; }
      .part-node:nth-child(odd)  { padding-left: 5%; }
      .part-node:nth-child(even) { padding-right: 5%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .start-badge { animation: none; }
      .part-node   { animation: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../dashboard.html" class="nav-brand">Til<span>Menger</span></a>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar">…</div>
    <a href="../dashboard.html" class="btn-back">← Dashboard</a>
  </div>
</nav>

<div class="status-screen" id="statusScreen">
  <div class="spinner"></div>
  <span>Loading your path…</span>
</div>

<main class="main" id="mainContent" style="display:none;">
  <div class="page-header">
    <h1>Your <em>Learning</em> Path</h1>
    <p>Complete each part to unlock the next one.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <div class="progress-label">Progress</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="progress-count" id="progressCount">0<span>/ 0 parts</span></div>
    <button class="jump-current" id="jumpCurrentBtn">Jump to<br>current</button>
  </div>

  <div class="part-track" id="partTrack"></div>
</main>

<script src="../config.js"></script>
<script>
  const API   = (typeof LINGUA !== 'undefined') ? LINGUA.auth  : '';
  const VOCAB = (typeof LINGUA !== 'undefined') ? LINGUA.vocab : '';
  const token = localStorage.getItem('token');
  if (!token) { window.location.href = 'index.html'; }

  let currentNodeEl = null;

  // ─── Build three SVG arc segments around each node button ─────────────────
  //
  //  Arc 1 (top-right,  10°→110°) — Vocabulary / word learning
  //  Arc 2 (bottom,    130°→230°) — Sentence builder
  //  Arc 3 (top-left,  250°→350°) — Pronunciation
  //
  //  SVG is 108×108 with the circle center at (54, 54) and arc radius 48.
  //  0° = 12 o'clock; angles increase clockwise.
  //
  function buildArcSvg(vocabDone, sbDone, prDone) {
    const cx = 54, cy = 54, r = 48, sw = 5.5;
    const DONE = '#58CC02';   // green  — matches --green
    const TODO = '#D6D6D6';   // gray   — matches --gray

    // Return an [x, y] point on the circle at `deg` degrees (0 = top, CW)
    function pt(deg) {
      const rad = deg * Math.PI / 180;
      return [
        (cx + r * Math.sin(rad)).toFixed(2),
        (cy - r * Math.cos(rad)).toFixed(2),
      ];
    }

    // Build a single arc path between `startDeg` and `endDeg`
    function mkArc(startDeg, endDeg, done) {
      const [x1, y1] = pt(startDeg);
      const [x2, y2] = pt(endDeg);
      const large = (endDeg - startDeg) > 180 ? 1 : 0;
      return `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2}" `
           + `stroke="${done ? DONE : TODO}" stroke-width="${sw}" `
           + `fill="none" stroke-linecap="round"/>`;
    }

    return `<svg class="arc-ring" width="108" height="108" viewBox="0 0 108 108" aria-hidden="true">`
      + mkArc(10,  110, vocabDone)   // top-right  → vocabulary
      + mkArc(130, 230, sbDone)      // bottom     → sentence builder
      + mkArc(250, 350, prDone)      // top-left   → pronunciation
      + `</svg>`;
  }

  // ─── Error helper ─────────────────────────────────────────────────────────
  function showError(message) {
    document.getElementById('statusScreen').innerHTML = `
      <span style="font-size:2.5rem">⚠️</span>
      <span style="font-weight:800">${message}</span>
      <button class="btn-retry" onclick="init()">Try again</button>
    `;
    document.getElementById('statusScreen').style.display = 'flex';
    document.getElementById('mainContent').style.display  = 'none';
  }

  function computeStatuses(parts, completedSet) {
    let chainOpen = true;
    return parts.map((p) => {
      const isComplete = completedSet.has(p.id);
      let status;
      if (!chainOpen)      { status = 'locked'; }
      else if (isComplete) { status = 'completed'; }
      else                 { status = 'current'; chainOpen = false; }
      return { ...p, status };
    });
  }

  // ─── Render the zigzag node track ─────────────────────────────────────────
  // sbCompleted / prCompleted are Sets of part IDs (Number) where those tasks
  // have been finished; loaded from localStorage by init().
  function renderParts(parts, sbCompleted, prCompleted) {
    const track = document.getElementById('partTrack');
    track.innerHTML = '';
    currentNodeEl = null;

    if (!parts.length) {
      track.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          No parts yet — check back soon!
        </div>`;
      return;
    }

    parts.forEach((part, idx) => {
      const node = document.createElement('div');
      node.className = `part-node is-${part.status}`;
      node.style.animationDelay = `${idx * 0.045}s`;

      const icon       = part.status === 'completed' ? '✓'
                       : part.status === 'locked'    ? '🔒' : '★';
      const eyebrow    = part.status === 'completed' ? 'Completed'
                       : part.status === 'locked'    ? 'Locked' : 'Up next';
      const xpTag      = part.status === 'locked'
                       ? `<span class="tag tag-xp">🔒 Locked</span>`
                       : `<span class="tag tag-xp">⚡ +10 XP</span>`;
      const wordTag    = part.status !== 'locked'
                       ? `<span class="tag tag-words">📖 3 words</span>` : '';
      const startBadge = part.status === 'current'
                       ? `<div class="start-badge">START</div>` : '';

      // ── Three-arc progress ring ──────────────────────────────────────────
      const vocabDone = part.status === 'completed';
      const sbDone    = sbCompleted.has(part.id);
      const prDone    = prCompleted.has(part.id);
      const arcSvg    = buildArcSvg(vocabDone, sbDone, prDone);

      node.innerHTML = `
        <div class="node-btn-wrap">
          ${startBadge}
          ${arcSvg}
          <button
            class="node-btn"
            ${part.status === 'locked' ? 'disabled title="Finish the previous part first"' : ''}
            aria-label="Part ${part.part_number} — ${eyebrow}"
          >${icon}</button>
        </div>
        <div class="node-info">
          <div class="node-eyebrow">${eyebrow}</div>
          <div class="node-title">Part ${part.part_number}</div>
          <div class="node-tags">${xpTag}${wordTag}</div>
        </div>
      `;

      if (part.status !== 'locked') {
        node.style.cursor = 'pointer';
        node.addEventListener('click', () => {
          window.location.href = `lesson.html?part_id=${part.id}`;
        });
      }

      if (part.status === 'current') currentNodeEl = node;
      track.appendChild(node);
    });
  }

  function updateProgress(parts, completedSet) {
    const total = parts.length;
    const done  = parts.filter(p => completedSet.has(p.id)).length;
    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressCount').innerHTML  = `${done}<span>/ ${total} parts</span>`;
  }

  async function init() {
    document.getElementById('statusScreen').innerHTML =
      `<div class="spinner"></div><span>Loading your path…</span>`;
    document.getElementById('statusScreen').style.display = 'flex';
    document.getElementById('mainContent').style.display  = 'none';

    try {
      const res  = await fetch(`${API}/me`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok || !data.success) { window.location.href = 'index.html'; return; }
      document.getElementById('navAvatar').textContent = data.user.name[0].toUpperCase();

      const [pRes, prRes] = await Promise.all([
        fetch(`${VOCAB}/parts`,    { headers: { Authorization: `Bearer ${token}` } }),
        fetch(`${VOCAB}/progress`, { headers: { Authorization: `Bearer ${token}` } }),
      ]);
      const pData  = await pRes.json();
      const prData = await prRes.json();
      if (!pData.success)  throw new Error(pData.message  || 'Could not load parts.');
      if (!prData.success) throw new Error(prData.message || 'Could not load progress.');

      const completedSet = new Set(prData.completed);
      const parts = computeStatuses(pData.parts, completedSet);

      // ── Load sentence-builder and pronunciation completion from localStorage
      // sentence_builder.html saves: lingua_sb_done = JSON array of part IDs
      // pronunciation.html saves:   lingua_pr_done = JSON array of part IDs
      const sbCompleted = new Set(
        (JSON.parse(localStorage.getItem('lingua_sb_done') || '[]')).map(Number)
      );
      const prCompleted = new Set(
        (JSON.parse(localStorage.getItem('lingua_pr_done') || '[]')).map(Number)
      );

      updateProgress(parts, completedSet);
      renderParts(parts, sbCompleted, prCompleted);

      document.getElementById('statusScreen').style.display = 'none';
      document.getElementById('mainContent').style.display  = 'block';

      document.getElementById('jumpCurrentBtn').onclick = () => {
        if (currentNodeEl) currentNodeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      };

      if (currentNodeEl) {
        setTimeout(() => currentNodeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
      }
    } catch (err) {
      console.error(err);
      showError(err.message || 'Could not load your parts. Is the server running?');
    }
  }

  init();
</script>
</body>
</html>
