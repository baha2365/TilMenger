<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ielts Preparation</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
body{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:url("https://cdnb.artstation.com/p/assets/images/images/063/323/031/large/c-damse-pewpewpew-sakumo-apartment-night-time.jpg?1685279411") no-repeat center/cover;
  color:white;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index:0;
}

/* HEADER */
header{
  position:relative;
  z-index:1;
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:white;
  opacity:0.8;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
}

/* MAIN */
.main{
  position:relative;
  z-index:1;
  text-align:center;
  margin-top:50px;
}

/* TITLE */
.main h1{
  font-size:60px;
  margin-bottom:15px;
}

.main p{
  opacity:0.8;
  margin-bottom:40px;
}

/* BUTTON CONTAINER */
.buttons{
  display:flex;
  justify-content:center;
  gap:30px;
}

/* BUTTON STYLE */
.btn{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  color:white;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

/* GLOW EFFECT */
.btn::before{
  content:"";
  position:absolute;
  width:300%;
  height:300%;
  top:-100%;
  left:-100%;
  background:radial-gradient(circle, rgba(255,255,255,0.4), transparent);
  transform:rotate(45deg);
  transition:0.5s;
}

.btn:hover::before{
  top:0;
  left:0;
}

/* CONVERSATION BUTTON */
.conversation{
  background:linear-gradient(135deg, #00c6ff, #0072ff);
}

.conversation:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #00c6ff;
}

/* TOPIC BUTTON */
.topic{
  background:linear-gradient(135deg, #ff7b00, #ff3d00);
}

.topic:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #ff7b00;
}

/* FOOTER */
footer{
  position:relative;
  z-index:1;
  text-align:center;
  padding:15px;
  font-size:14px;
  opacity:0.7;
  border-top:1px solid rgba(255,255,255,0.1);

}

 /* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:0;
  height:100%;
  width:70px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-right:1px solid rgba(255,255,255,0.1);
  transition:0.4s;
  z-index:10;
  overflow:hidden;
}

/* EXPANDED */
.sidebar.active{
  width:220px;
}

/* HEADER */
.sidebar-header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px;
  cursor:pointer;
}

.sidebar-header i{
  font-size:20px;
}

.logo-text{
  opacity:0;
  transition:0.3s;
}

/* SHOW TEXT WHEN OPEN */
.sidebar.active .logo-text{
  opacity:1;
}

/* LINKS */
.sidebar-links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
}

.sidebar-links a{
  display:flex;
  align-items:center;
  gap:15px;
  padding:15px 20px;
  text-decoration:none;
  color:white;
  transition:0.3s;
  white-space:nowrap;
}

.sidebar-links a i{
  font-size:18px;
  min-width:25px;
}

/* TEXT HIDDEN BY DEFAULT */
.sidebar-links span{
  opacity:0;
  transition:0.3s;
}

/* SHOW TEXT WHEN OPEN */
.sidebar.active .sidebar-links span{
  opacity:1;
}

/* HOVER EFFECT */
.sidebar-links a:hover{
  background:rgba(255,255,255,0.1);
  transform:translateX(5px);
}

/* GLOW EFFECT */
.sidebar-links a:hover i{
  color:#00c6ff;
}

/* PUSH MAIN CONTENT */
body{
  padding-left:70px;
  transition:0.4s;
}

.sidebar.active ~ *{
  margin-left:150px;
}

</style>
</head>

<body>

<header>
  <div class="logo">🎓 Learn English AI</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
  </nav>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <i class="fa fa-bars" id="toggleBtn"></i>
    <span class="logo-text">Menu</span>
  </div>

  <div class="sidebar-links">
    <a href="vocabulary.html">
      <i class="fa fa-book"></i>
      <span>Reading</span>
    </a>

    <a href="situations.html">
      <i class="fa-solid fa-ear-listen"></i>
      <span>Listening</span>
    </a>

    <a href="./ielts_speaking.html">
      <i class="fa fa-graduation-cap"></i>
      <span>Speaking</span>
    </a>
    <a href="books.html">
      <i class="fa-solid fa-feather-pointed"></i>
      <span>Writing</span>
    </a>
  </div>

</div>

<div class="main">
  <h1>IELTS Preparation</h1>
  <p>Start your smart English learning journey</p>

  <!-- <div class="buttons">
    <button class="btn conversation" onclick="location.href='conversation.html'">
      <i class="fa fa-comments"></i> Conversation
    </button>

    <button class="btn topic" onclick="location.href='topics.html'">
      <i class="fa fa-book"></i> Choose Topic
    </button>
  </div> -->
</div>

<footer>
  © 2026 Learn English AI — All rights reserved
</footer>


<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.onclick = () => {
  sidebar.classList.toggle("active");
};
</script>

</body>
</html>
