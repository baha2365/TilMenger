<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Speaking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
      *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:rgb(0, 0, 0);
  background:url("https://img.freepik.com/free-psd/blank-wall-psd-japandi-living-room-interior_53876-109284.jpg?semt=ais_hybrid&w=740&q=80") no-repeat center/cover;
}

/* DARK GLASS OVERLAY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

/* 3D CANVAS */
#container3D{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* TITLE */
h1{
  position:absolute !important;
  left:50% !important;
  top:40px !important;
  transform:translateX(-50%);
  font-size:48px !important;
  text-align:center;
  letter-spacing:2px;
  color:#ffffff;
  text-shadow:0 0 20px rgba(0,0,0,0.8);
  z-index:10;
}

/* MAIN WORD BOX */
#mainWordBox{
  left:50% !important;
  top:120px !important;
  transform:translateX(-50%);
  width:500px !important;
  height:60px;
  font-size:32px !important;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3) !important;
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* CHAT BOX */
#chat{
  position:absolute !important;
  left:1150px !important;
  top:200px !important;
  transform:translateX(-50%);
  width:700px !important;
  height:320px !important;
  padding:15px;
  border-radius:15px;
  background:rgb(255, 255, 255,0.9);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2) !important;
  overflow-y:auto;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  z-index:10;
}

/* SCROLLBAR */
#chat::-webkit-scrollbar{
  width:6px;
}
#chat::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.3);
  border-radius:10px;
}

/* ── SUGGESTION BOX ─────────────────────────────────────────── */
#suggestionBox {
  position: absolute !important;
  left: 1150px !important;
  top: 530px !important;               /* sits just below the chat box */
  transform: translateX(-50%);
  width: 680px !important;
  min-height: 50px;
  padding: 14px 18px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,230,50,0.92), rgba(255,180,0,0.92));
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,200,0,0.7);
  box-shadow: 0 6px 24px rgba(200,140,0,0.35);
  color: #3a2800;
  font-size: 15px;
  line-height: 1.55;
  font-style: italic;
  z-index: 20;
  cursor: pointer;
  /* hidden by default */
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(-8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}

#suggestionBox::before {
  content: "💡 Suggestion (click to use):  ";
  font-style: normal;
  font-weight: 700;
  font-size: 13px;
  color: #7a4e00;
  display: block;
  margin-bottom: 4px;
}

#suggestionBox.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}

#suggestionBox:hover {
  background: linear-gradient(135deg, rgba(255,240,80,0.97), rgba(255,195,0,0.97));
  box-shadow: 0 8px 30px rgba(200,140,0,0.5);
}

/* INPUT */
#userInput{
  position:absolute !important;
  left:1150px !important;
  bottom:140px !important;
  transform:translateX(-50%);
  width:600px !important;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  backdrop-filter:blur(10px);
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
  z-index:10;
}

/* SEND BUTTON */
#sendBtn{
  position:absolute !important;
  left:calc(50% + 410px) !important;
  bottom:140px !important;
  width:90px !important;
  padding:12px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg, #00c6ff, #0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
  z-index:10;
}

#sendBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

/* MIC BUTTON */
#micBtn{
  position:absolute !important;
  left:calc(50% - 160px) !important;
  bottom:140px !important;
  width:50px !important;
  height:50px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg, #ff4d4d, #ff0000);
  color:white;
  cursor:pointer;
  transition:0.3s;
  z-index:10;
}

#micBtn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px red;
}


/* Suggest BUTTON */
#suggestion_btn{
  position:absolute !important;
  left:calc(50% - 160px) !important;
  bottom:200px !important;
  width:50px !important;
  height:50px;
  border-radius:50%;
  border:none;
  background-color: rgb(72, 255, 0);
  color:rgb(0, 110, 255);
  cursor:pointer;
  transition:0.3s;
  z-index:10;
  font-size: 20px;
}

#suggestion_btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px rgb(251, 255, 0);
}

/* TOPIC TITLE */
#topicTitle{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
  opacity:0.8;
  z-index:10;
}

/* CANVAS FIX */
canvas{
  display:block;
}
  </style>
</head>
<body>

  <div><h2 id="topicTitle"></h2></div>

  <div id="container3D"></div>

  <h1 style="position: absolute; left:900px; top:90px; font-size: 60px;">
    <!-- Lets Learn English -->
  </h1>
  <div id="mainWordBox" 
     style="
        position:absolute;
        left:750px;
        top:180px;
        width:600px;
        height:60px;
        font-size:40px;
        font-weight:bold;
        color:yellow;
        border:2px solid yellow;
        text-align:center;
        display:none;">
</div>

  <div id="chat" style="border:1px solid red; height:300px; overflow:auto;"></div>

  <!-- SUGGESTION BOX: appears below chat, above input -->
  <div id="suggestionBox"></div>

  <input type="text" id="userInput" placeholder="Type message..." />

<button id="suggestion_btn"><i class="fa-solid fa-lightbulb"></i></button>
<button id="micBtn" style="width:60px;"></button>
<button id="sendBtn" style="width:100px;">Send</button>


<script>
        // WebSocket connection
        const ws = new WebSocket("ws://localhost:3003/file_stream");
        ws.binaryType = "arraybuffer";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 24000});

        ws.onopen = () => {
            console.log("Connected to /file_stream");
        };

        ws.onmessage = async (event) => {
            // Convert Int16 PCM to Float32
            const pcm16 = new Int16Array(event.data);
            const float32 = new Float32Array(pcm16.length);
            for(let i=0;i<pcm16.length;i++){
                float32[i] = pcm16[i] / 32767;
            }

            // Create buffer and play
            const buffer = audioCtx.createBuffer(1, float32.length, 24000);
            buffer.copyToChannel(float32, 0);

            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(audioCtx.destination);
            src.start();
        };

        ws.onerror = (err) => {
            console.error("WebSocket error:", err);
        };

        ws.onclose = () => {
            console.log("WebSocket connection closed.");
        };
    </script>

    <script type="module" src="./ielts_speaking.js"></script>
</body>
</html>
