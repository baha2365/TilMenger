    <style>
      *{

body{

/* DARK GLASS OVERLAY */

  height:100%;

/* 3D CANVAS */

/* TITLE */

  border-radius:12px;

  box-shadow:0 0 20px rgba(255,255,255,0.1);

/* CHAT BOX */
#chat{
  position:absolute !important;
  left:1150px !important;
  top:200px !important;
  transform:translateX(-50%);
  width:700px !important;
  height:320px !important;
  padding:15px;
  border-radius:15px;
  background:rgb(255, 255, 255,0.9);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2) !important;
  overflow-y:auto;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  z-index:10;
}

/* SCROLLBAR */
#chat::-webkit-scrollbar{
  width:6px;
}
#chat::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.3);
  border-radius:10px;
}

/* INPUT */
#userInput{
  position:absolute !important;
  left:1150px !important;
  bottom:140px !important;
  transform:translateX(-50%);
  width:600px !important;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  backdrop-filter:blur(10px);
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
  z-index:10;
}

/* SEND BUTTON */
#sendBtn{
  position:absolute !important;
  left:calc(50% + 410px) !important;
  bottom:140px !important;
  width:90px !important;
  padding:12px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg, #00c6ff, #0072ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
  z-index:10;
}

#sendBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

/* MIC BUTTON */
#micBtn{
  position:absolute !important;
  left:calc(50% - 160px) !important;
  bottom:140px !important;
  width:50px !important;
  height:50px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg, #ff4d4d, #ff0000);
  color:white;
  cursor:pointer;
  transition:0.3s;
  z-index:10;
}

#micBtn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px red;
}

/* TOPIC TITLE */
#topicTitle{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
  opacity:0.8;
  z-index:10;
}

/* CANVAS FIX */
canvas{
  display:block;
}
  </style>

</div>

<button id="micBtn" style="width:60px;"></button>
<button id="sendBtn" style="width:100px;">Send</button>


<script>
        // WebSocket connection
        const ws = new WebSocket("ws://localhost:3003/file_stream");
        ws.binaryType = "arraybuffer";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 24000});

        ws.onopen = () => {
            console.log("Connected to /file_stream");
        };

        ws.onmessage = async (event) => {
            // Convert Int16 PCM to Float32
            const pcm16 = new Int16Array(event.data);
            const float32 = new Float32Array(pcm16.length);
            for(let i=0;i<pcm16.length;i++){
                float32[i] = pcm16[i] / 32767;
            }

            // Create buffer and play
            const buffer = audioCtx.createBuffer(1, float32.length, 24000);
            buffer.copyToChannel(float32, 0);

            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(audioCtx.destination);
            src.start();
        };

        ws.onerror = (err) => {
            console.error("WebSocket error:", err);
        };

        ws.onclose = () => {
            console.log("WebSocket connection closed.");
        };
    </script>

    <script type="module" src="airport_logic.js"></script>
</body>
</html>
