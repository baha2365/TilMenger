<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Talk to Emma — TilMenger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #F5F0E8;
      --ink:     #1A1612;
      --rust:    #C4572A;
      --rust-lt: #E0763A;
      --sage:    #4A6741;
      --sage-lt: #6F9463;
      --gold:    #D4A853;
      --gold-lt: #E8C274;
      --muted:   #8A7E73;
      --border:  #DDD5C8;
      --s0:      #121010;   /* page bg */
      --s1:      #1B1815;   /* header / footer */
      --s2:      #241F1B;   /* teacher bubbles / surfaces */
      --s3:      #2D2723;   /* hover states */
      --error:   #C0392B;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--s0);
      color: var(--cream);
      overflow: hidden;
    }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    /* ── App shell ─────────────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.95rem 1.5rem;
      background: rgba(27,24,21,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      gap: 1rem;
      position: relative;
      z-index: 5;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      min-width: 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      white-space: nowrap;
      transition: color 0.2s;
      flex-shrink: 0;
      padding: 0.3rem 0.1rem;
    }
    .back-link:hover { color: var(--cream); }

    .divider { width: 1px; height: 16px; background: rgba(255,255,255,0.09); flex-shrink: 0; }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      min-width: 0;
    }
    .brand-icon {
      font-size: 1rem;
      width: 26px; height: 26px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--rust), var(--gold));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.98rem;
      color: var(--cream);
      white-space: nowrap;
    }
    .brand-sep { color: rgba(255,255,255,0.16); font-size: 0.9rem; }
    .teacher-label { font-size: 0.82rem; color: var(--gold); font-weight: 500; white-space: nowrap; }

    .online-dot {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage-lt);
      box-shadow: 0 0 6px rgba(111,148,99,0.9);
    }

    .header-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }

    .level-badge {
      background: rgba(212,168,83,0.1);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--gold);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      padding: 0.32rem 0.75rem;
      border-radius: 20px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Chat area (transcript) ───────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.1rem 1.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .chat-empty {
      margin: auto 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 0 1rem;
    }
    .chat-empty span { display: block; font-family: 'Playfair Display', serif; font-style: italic; color: #C8BFB5; font-size: 0.95rem; margin-bottom: 0.3rem; }

    /* Messages */
    #messages { display: flex; flex-direction: column; gap: 0.9rem; }

    .message {
      display: flex;
      max-width: 82%;
      animation: msgIn 0.28s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.teacher {
      align-self: flex-start;
      flex-direction: row;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: column;
      align-items: flex-end;
    }

    .msg-avatar {
      flex-shrink: 0;
      width: 26px; height: 26px;
      margin-top: 2px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rust), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.68rem;
      color: var(--ink);
    }

    .msg-col { display: flex; flex-direction: column; min-width: 0; }

    .msg-bubble {
      padding: 0.78rem 1.02rem;
      border-radius: 15px;
      font-size: 0.88rem;
      line-height: 1.65;
      word-break: break-word;
    }
    .message.teacher .msg-bubble {
      background: var(--s2);
      border: 1px solid rgba(255,255,255,0.05);
      border-left: 2px solid rgba(196,87,42,0.45);
      border-top-left-radius: 4px;
      color: var(--cream);
    }
    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--rust), #B94F26);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-meta {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.22);
      margin-top: 0.3rem;
      padding: 0 0.15rem;
    }
    .message.user .msg-meta { text-align: right; }

    /* Typing indicator */
    .typing {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      background: var(--s2);
      border: 1px solid rgba(255,255,255,0.05);
      border-left: 2px solid rgba(196,87,42,0.45);
      border-radius: 15px;
      border-top-left-radius: 4px;
      animation: msgIn 0.28s ease both;
    }
    .typing.visible { display: flex; }

    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBounce 1.3s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }
    .typing-label { font-size: 0.73rem; color: var(--muted); }

    /* ── Topic chips ───────────────────────────────────────────────────────── */
    .topics-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.7rem 1.5rem 0;
      flex-shrink: 0;
      justify-content: center;
    }
    .topic-chip {
      background: var(--s2);
      border: 1px solid rgba(255,255,255,0.09);
      color: #C8BFB5;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      padding: 0.4rem 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .topic-chip:hover:not(:disabled) {
      background: rgba(196,87,42,0.16);
      border-color: rgba(196,87,42,0.4);
      color: var(--gold);
    }
    .topic-chip:disabled { opacity: 0.35; cursor: default; }

    /* ── Stage: the living orb ────────────────────────────────────────────── */
    .stage {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 0.5rem 1rem 0.15rem;
      height: 178px;
    }

    .orb-field {
      position: relative;
      width: 148px;
      height: 148px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-halo {
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,87,42,0.22), transparent 70%);
      filter: blur(9px);
      opacity: 0.55;
      animation: haloPulse 5s ease-in-out infinite;
      transition: background 0.6s ease, opacity 0.6s ease;
    }

    .orb-core {
      position: relative;
      width: 118px;
      height: 118px;
      border-radius: 42% 58% 63% 37% / 46% 42% 58% 54%;
      background: linear-gradient(135deg, var(--rust) 0%, var(--gold) 55%, var(--sage) 100%);
      background-size: 220% 220%;
      box-shadow: 0 0 38px rgba(196,87,42,0.22), inset 0 0 26px rgba(0,0,0,0.18);
      animation: morph 7s ease-in-out infinite, drift 12s ease-in-out infinite;
      transform: scale(calc(1 + var(--amp, 0) * 0.42));
      transition: transform 70ms linear, background 0.6s ease, box-shadow 0.6s ease;
    }
    @keyframes morph {
      0%, 100% { border-radius: 42% 58% 63% 37% / 46% 42% 58% 54%; }
      33%      { border-radius: 58% 42% 38% 62% / 55% 60% 40% 45%; }
      66%      { border-radius: 48% 52% 55% 45% / 40% 55% 45% 60%; }
    }
    @keyframes drift {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    @keyframes haloPulse {
      0%, 100% { transform: scale(1);    opacity: 0.5; }
      50%      { transform: scale(1.14); opacity: 0.85; }
    }

    .stage[data-state="listening"] .orb-core {
      background: linear-gradient(135deg, var(--rust-lt), var(--rust) 55%, #ff8a5c 100%);
      box-shadow: 0 0 52px rgba(196,87,42,0.42), inset 0 0 26px rgba(0,0,0,0.2);
      animation-duration: 3.2s, 8s;
    }
    .stage[data-state="listening"] .orb-halo {
      background: radial-gradient(circle, rgba(196,87,42,0.5), transparent 70%);
      opacity: 0.9;
    }

    .stage[data-state="processing"] .orb-core {
      background: linear-gradient(135deg, var(--gold), var(--gold-lt) 50%, var(--rust) 100%);
      box-shadow: 0 0 44px rgba(212,168,83,0.4), inset 0 0 26px rgba(0,0,0,0.2);
      animation-duration: 2s, 6s;
    }
    .stage[data-state="processing"] .orb-halo {
      background: radial-gradient(circle, rgba(212,168,83,0.42), transparent 70%);
      opacity: 0.8;
    }

    .stage[data-state="speaking"] .orb-core {
      background: linear-gradient(135deg, var(--sage), var(--sage-lt) 55%, var(--gold) 100%);
      box-shadow: 0 0 52px rgba(74,103,65,0.4), inset 0 0 26px rgba(0,0,0,0.2);
      animation-duration: 3.6s, 7s;
    }
    .stage[data-state="speaking"] .orb-halo {
      background: radial-gradient(circle, rgba(74,103,65,0.48), transparent 70%);
      opacity: 0.88;
    }

    .stage-status {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      transition: color 0.25s;
      min-height: 1.1em;
    }
    .stage-status.listening { color: #e58a68; }
    .stage-status.thinking  { color: var(--gold); }
    .stage-status.speaking  { color: var(--sage-lt); }

    /* ── Control bar ───────────────────────────────────────────────────────── */
    .control-bar {
      flex-shrink: 0;
      background: var(--s1);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 0.85rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .input-row {
      display: grid;
      grid-template-columns: 50px 1fr 50px;
      align-items: center;
      width: 100%;
      max-width: 480px;
      gap: 0.6rem;
    }

    .side-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--s2);
      color: #C8BFB5;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }
    .side-btn:hover:not(:disabled) { background: var(--s3); border-color: rgba(255,255,255,0.15); }
    .side-btn:disabled { opacity: 0.32; cursor: not-allowed; }

    .side-spacer { width: 46px; height: 46px; }

    .center-slot { display: flex; justify-content: center; width: 100%; }

    .voice-controls { display: flex; justify-content: center; }

    /* Mic button */
    .mic-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: none;
      background: var(--rust);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.12s;
      position: relative;
      z-index: 1;
    }
    .mic-btn svg { pointer-events: none; }

    .mic-btn:hover:not(:disabled) { background: var(--rust-lt); transform: scale(1.04); }
    .mic-btn:active:not(:disabled) { transform: scale(0.97); }

    .mic-btn:disabled {
      background: var(--s3);
      cursor: not-allowed;
      opacity: 0.45;
    }

    .mic-btn.recording { background: #d63030; }
    .mic-btn.recording::before,
    .mic-btn.recording::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid #d63030;
      animation: micPulse 2s ease-out infinite;
    }
    .mic-btn.recording::after { animation-delay: 0.7s; }
    @keyframes micPulse {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* Text mode input */
    .text-controls {
      display: none;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      background: var(--s2);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 0.3rem 0.3rem 0.3rem 1.05rem;
      transition: border-color 0.2s;
    }
    .text-controls:focus-within { border-color: rgba(212,168,83,0.4); }

    #textInput {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 0.55rem 0;
    }
    #textInput::placeholder { color: var(--muted); }
    #textInput:disabled { opacity: 0.5; }

    .send-btn {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--rust);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .send-btn:hover:not(:disabled) { background: var(--rust-lt); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; background: var(--s3); }

    .mic-hint {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      text-align: center;
      min-height: 1em;
    }

    /* ── Loading overlay ───────────────────────────────────────────────────── */
    .loader {
      position: fixed;
      inset: 0;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 200;
      transition: opacity 0.5s;
    }
    .loader.gone { opacity: 0; pointer-events: none; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.07);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-label { font-size: 0.82rem; color: var(--muted); }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 128px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--s2);
      border: 1px solid rgba(196,87,42,0.35);
      color: var(--cream);
      padding: 0.65rem 1.1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 100;
      max-width: min(90vw, 360px);
      text-align: center;
      line-height: 1.45;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .app-header { padding: 0.75rem 1rem; }
      .brand-name, .teacher-label { font-size: 0.85rem; }
      .chat-area { padding: 1rem 1rem 0.5rem; }
      .topics-row { padding: 0.6rem 1rem 0; }
      .control-bar { padding: 0.75rem 1rem 1.1rem; }
      .message { max-width: 92%; }
      .stage { height: 156px; }
      .orb-field { width: 128px; height: 128px; }
      .orb-core { width: 102px; height: 102px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-label" id="loaderLabel">Connecting to Emma…</div>
</div>

<!-- Toast notifications -->
<div class="toast" id="toast"></div>

<div class="app">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <a href="dashboard.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Dashboard
      </a>
      <div class="divider"></div>
      <div class="brand-row">
        <span class="brand-icon">🎓</span>
        <span class="brand-name">TilMenger</span>
        <span class="brand-sep">·</span>
        <span class="teacher-label">Emma</span>
      </div>
      <div class="online-dot">
        <div class="dot"></div>
        <span>Online</span>
      </div>
    </div>
    <div class="header-right">
      <div class="level-badge" id="levelBadge">—</div>
    </div>
  </header>

  <!-- ── Transcript ──────────────────────────────────────────────────────── -->
  <main class="chat-area" id="chatArea">
    <div id="messages"></div>

    <!-- Typing indicator -->
    <div class="typing" id="typingEl">
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
      <span class="typing-label">Emma is thinking…</span>
    </div>
  </main>

  <!-- ── Topic chips ──────────────────────────────────────────────────────── -->
  <div class="topics-row" id="topicsRow">
    <button class="topic-chip" onclick="pickTopic(this)">Daily conversation</button>
    <button class="topic-chip" onclick="pickTopic(this)">Introduce myself</button>
    <button class="topic-chip" onclick="pickTopic(this)">Pronunciation help</button>
    <button class="topic-chip" onclick="pickTopic(this)">Vocabulary quiz</button>
    <button class="topic-chip" onclick="pickTopic(this)">Tell me a story</button>
    <button class="topic-chip" onclick="pickTopic(this)">Correct my grammar</button>
  </div>

  <!-- ── Stage: living orb + status ──────────────────────────────────────── -->
  <section class="stage" id="stage" data-state="idle">
    <div class="orb-field">
      <div class="orb-halo"></div>
      <div class="orb-core" id="orbCore"></div>
    </div>
    <p class="stage-status" id="statusText">Tap the mic to speak</p>
  </section>

  <!-- ── Controls ─────────────────────────────────────────────────────────── -->
  <footer class="control-bar">
    <div class="input-row" id="inputRow">

      <!-- Left: switch between voice and text -->
      <button class="side-btn" id="modeToggleBtn" onclick="toggleMode()" title="Type a message" aria-label="Type a message">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="2.5"/>
          <line x1="6" y1="10" x2="6" y2="10.01"/>
          <line x1="10" y1="10" x2="10" y2="10.01"/>
          <line x1="14" y1="10" x2="14" y2="10.01"/>
          <line x1="18" y1="10" x2="18" y2="10.01"/>
          <line x1="6" y1="14" x2="18" y2="14"/>
        </svg>
      </button>

      <!-- Center: mic (voice mode) or text field (text mode) -->
      <div class="center-slot">
        <div class="voice-controls" id="voiceControls">
          <button class="mic-btn" id="micBtn" onclick="toggleRecord()" title="Click to speak" aria-label="Record voice message">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
              <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
              <path d="M5 10v2a7 7 0 0 0 14 0v-2" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" fill="none"/>
              <line x1="12" y1="21" x2="12" y2="19" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="23" x2="15" y2="23" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="text-controls" id="textControls">
          <input type="text" id="textInput" placeholder="Message Emma…" autocomplete="off" aria-label="Type a message to Emma" />
          <button class="send-btn" id="sendBtn" onclick="handleSendText()" title="Send" aria-label="Send message">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Right: balances the layout so the mic stays centered -->
      <div class="side-spacer" aria-hidden="true"></div>
    </div>

    <div class="mic-hint" id="micHint">Tap to speak · Tap again to send</div>
  </footer>

</div><!-- .app -->

<script src="/config.js"></script>
<script>
// ─── Bootstrap ────────────────────────────────────────────────────────────────
const token = localStorage.getItem('token');
if (!token) { window.location.href = 'index.html'; }

const BASE = (typeof LINGUA !== 'undefined' && LINGUA.aiTeacher)
  ? LINGUA.aiTeacher
  : `${location.origin}/api/ai-teacher`;

// ─── State ────────────────────────────────────────────────────────────────────
// appState: idle | recording | transcribing | thinking | speaking
let appState   = 'idle';
// mode: voice | text — which control the center slot shows
let mode       = 'voice';

let history    = [];   // [{ role: 'user'|'assistant', content }]
let topicsGone = false;

// Recording
let recorder   = null;
let chunks     = [];
let micStream  = null;
let audioCtx   = null;
let analyser   = null;

// Orb animation (shared by mic-listening and TTS-speaking reactivity)
let orbRafId     = null;
let ttsCtx       = null;
let ttsInterrupt = null;

// Playback
let currentAudio = null;

// ─── DOM ─────────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const chatArea      = $('chatArea');
const messagesEl    = $('messages');
const typingEl      = $('typingEl');
const micBtn        = $('micBtn');
const statusText    = $('statusText');
const stage         = $('stage');
const orbCore       = $('orbCore');
const modeToggleBtn = $('modeToggleBtn');
const voiceControls = $('voiceControls');
const textControls  = $('textControls');
const textInput     = $('textInput');
const sendBtn       = $('sendBtn');
const topicsRow     = $('topicsRow');
const loader        = $('loader');
const loaderLbl     = $('loaderLabel');
const levelBadge    = $('levelBadge');
const toast         = $('toast');
const micHint       = $('micHint');

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, ms = 3500) {
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), ms);
}

// ─── State machine ────────────────────────────────────────────────────────────
// micDisabled/inputDisabled are independent: while Emma speaks, the mic stays
// tappable (barge-in interrupts her), but text entry is still locked, same as
// every other non-idle state.
const STATE_CFG = {
  idle:         { status: 'Tap the mic to speak',              micDisabled: false, inputDisabled: false, hint: 'Tap to speak · Tap again to send', orb: 'idle' },
  recording:    { status: '🔴 Listening…',                     micDisabled: false, inputDisabled: true,  hint: 'Tap again to stop and send',       orb: 'listening' },
  transcribing: { status: 'Processing your voice…',            micDisabled: true,  inputDisabled: true,  hint: '',                                  orb: 'processing' },
  thinking:     { status: 'Emma is thinking…',                 micDisabled: true,  inputDisabled: true,  hint: '',                                  orb: 'processing' },
  speaking:     { status: 'Emma is speaking — tap mic to interrupt', micDisabled: false, inputDisabled: true, hint: '',                              orb: 'speaking' },
};

function setState(s) {
  appState = s;
  const c = STATE_CFG[s] || STATE_CFG.idle;

  micBtn.classList.toggle('recording', s === 'recording');
  micBtn.disabled = c.micDisabled;

  modeToggleBtn.disabled = c.inputDisabled;
  textInput.disabled     = c.inputDisabled;
  sendBtn.disabled       = c.inputDisabled;

  statusText.className = 'stage-status' + (
    s === 'recording' ? ' listening' :
    (s === 'thinking' || s === 'transcribing') ? ' thinking' :
    s === 'speaking' ? ' speaking' : ''
  );
  statusText.textContent = c.status;
  micHint.textContent    = mode === 'text' ? 'Type your message and press send' : c.hint;

  stage.dataset.state = c.orb;
}

// ─── Voice / text mode toggle ─────────────────────────────────────────────────
function toggleMode() {
  if (appState !== 'idle') return;
  mode = mode === 'voice' ? 'text' : 'voice';
  applyMode();
}

function applyMode() {
  const isText = mode === 'text';
  voiceControls.style.display = isText ? 'none' : 'flex';
  textControls.style.display  = isText ? 'flex' : 'none';

  modeToggleBtn.innerHTML = isText
    ? `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
         <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
         <path d="M5 10v2a7 7 0 0 0 14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
         <line x1="12" y1="21" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
         <line x1="9" y1="23" x2="15" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
       </svg>`
    : `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <rect x="2" y="6" width="20" height="12" rx="2.5"/>
         <line x1="6" y1="10" x2="6" y2="10.01"/>
         <line x1="10" y1="10" x2="10" y2="10.01"/>
         <line x1="14" y1="10" x2="14" y2="10.01"/>
         <line x1="18" y1="10" x2="18" y2="10.01"/>
         <line x1="6" y1="14" x2="18" y2="14"/>
       </svg>`;
  modeToggleBtn.title = isText ? 'Switch to voice' : 'Type a message';
  modeToggleBtn.setAttribute('aria-label', modeToggleBtn.title);

  micHint.textContent = isText ? 'Type your message and press send' : STATE_CFG[appState].hint;

  if (isText) { textInput.focus(); }
}

// ─── Session init ─────────────────────────────────────────────────────────────
// The ONLY thing the loader waits on is the /session lookup (a fast DB read
// for name + level). As soon as that's back, the app is revealed and Emma's
// opening line streams in afterwards via loadGreeting(), same as any other
// reply — the person is never stuck staring at a blank loading screen.
async function init() {
  try {
    const res = await fetch(`${BASE}/session`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (res.status === 401) { localStorage.clear(); location.href = 'index.html'; return; }

    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    const { name, level } = data;
    levelBadge.textContent = level;

    // Reveal the app right away — don't hold the UI hostage to Emma's first reply.
    loader.classList.add('gone');
    setTimeout(() => loader.remove(), 500);

    // Kick off Emma's opening line in the background; UI is already interactive.
    loadGreeting(name);

  } catch (err) {
    console.error('init error:', err);
    loaderLbl.textContent = 'Could not connect. Refresh to retry.';
  }
}

async function loadGreeting(name) {
  const first = (name || 'there').split(' ')[0];
  try {
    const greeting = await callChat([{
      role: 'user',
      content: `My name is ${first}. Please greet me briefly and start the lesson.`,
    }]);

    history = [{ role: 'assistant', content: greeting }];
    addMsg('teacher', greeting);
    await playTTS(greeting);
  } catch (err) {
    console.error('loadGreeting error:', err);
    setState('idle');
    showToast("Emma couldn't start just now. Tap the mic to begin, or refresh to retry.");
  }
}

// ─── API helpers ──────────────────────────────────────────────────────────────
async function callChat(messages) {
  setState('thinking');
  typingEl.classList.add('visible');
  scrollDown();

  const res = await fetch(`${BASE}/chat`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body:    JSON.stringify({ messages }),
  });

  typingEl.classList.remove('visible');

  const data = await res.json();
  if (!data.success) throw new Error(data.message || 'Chat error');
  return data.reply;
}

async function playTTS(text) {
  setState('speaking');
  try {
    const res = await fetch(`${BASE}/speak`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body:    JSON.stringify({ text }),
    });
    if (!res.ok) throw new Error('TTS request failed');

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);

    currentAudio?.pause();
    currentAudio = new Audio(url);

    // Route playback through an analyser so the orb pulses with Emma's voice.
    // Non-fatal if unsupported — the reply stays fully audible either way.
    try {
      if (!ttsCtx) ttsCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (ttsCtx.state === 'suspended') await ttsCtx.resume();
      const src = ttsCtx.createMediaElementSource(currentAudio);
      const an  = ttsCtx.createAnalyser();
      an.fftSize = 64;
      src.connect(an);
      an.connect(ttsCtx.destination);
      driveOrb(an, () => appState === 'speaking' && currentAudio && !currentAudio.paused && !currentAudio.ended);
    } catch (e) {
      console.warn('Orb audio-reactivity unavailable:', e.message);
    }

    await new Promise((resolve, reject) => {
      ttsInterrupt = () => reject(new Error('interrupted'));
      currentAudio.onended = resolve;
      currentAudio.onerror = reject;
      currentAudio.play().catch(reject);
    });
    URL.revokeObjectURL(url);
  } catch (err) {
    console.warn('TTS playback skipped:', err.message);
    // Non-fatal — the text is still visible in the chat
  }
  ttsInterrupt = null;
  cancelAnimationFrame(orbRafId);
  orbCore.style.setProperty('--amp', '0');
  if (appState === 'speaking') setState('idle');
}

// ─── Recording ────────────────────────────────────────────────────────────────
async function toggleRecord() {
  if (appState === 'recording') { stopRecord(); return; }

  if (appState === 'speaking') {
    // Barge-in: tapping the mic while Emma talks interrupts her and starts listening.
    currentAudio?.pause();
    ttsInterrupt?.();
    cancelAnimationFrame(orbRafId);
    orbCore.style.setProperty('--amp', '0');
    setState('idle');
  } else if (appState !== 'idle') {
    return;
  }

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    showToast(
      err.name === 'NotAllowedError'
        ? 'Microphone access denied. Enable it in your browser settings.'
        : 'Could not access microphone.'
    );
    return;
  }

  // Web Audio analyser drives the orb's real-time reactivity
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  audioCtx.createMediaStreamSource(micStream).connect(analyser);

  chunks = [];

  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';

  recorder = new MediaRecorder(micStream, mime ? { mimeType: mime } : {});
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = onRecordStop;
  recorder.start(100);

  setState('recording');
  driveOrb(analyser, () => appState === 'recording');
}

function stopRecord() {
  if (recorder?.state !== 'inactive') recorder.stop();
  micStream?.getTracks().forEach(t => t.stop());
  cancelAnimationFrame(orbRafId);
  orbCore.style.setProperty('--amp', '0');
  audioCtx?.close();
  setState('transcribing');
}

async function onRecordStop() {
  if (!chunks.length) { setState('idle'); showToast('No audio captured. Please try again.'); return; }

  const mime = recorder?.mimeType || 'audio/webm';
  const blob = new Blob(chunks, { type: mime });

  if (blob.size < 800) { setState('idle'); showToast('Recording too short. Hold the mic and speak.'); return; }

  try {
    const ext  = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
    const form = new FormData();
    form.append('audio', blob, `rec.${ext}`);

    const tRes  = await fetch(`${BASE}/transcribe`, {
      method:  'POST',
      headers: { Authorization: `Bearer ${token}` },
      body:    form,
    });
    const tData = await tRes.json();
    if (!tData.success) throw new Error(tData.message);

    const userText = (tData.text || '').trim();
    if (!userText || tData.empty) {
      setState('idle');
      showToast(tData.nonEnglish
        ? "Let's keep it in English! Try that again."
        : "I couldn't hear that clearly. Please try again.");
      return;
    }

    await sendUserMessage(userText);

  } catch (err) {
    console.error('onRecordStop error:', err);
    showToast('Something went wrong. Please try again.');
    setState('idle');
  }
}

// ─── Orb reactivity ────────────────────────────────────────────────────────────
// Shared driver: reads live frequency data from any AnalyserNode (mic input
// while listening, or TTS playback while speaking) and maps volume to the
// orb's --amp CSS variable each frame, for as long as isActiveFn() is true.
function driveOrb(analyserNode, isActiveFn) {
  const data = new Uint8Array(analyserNode.frequencyBinCount);
  cancelAnimationFrame(orbRafId);

  const step = () => {
    if (!isActiveFn()) { orbCore.style.setProperty('--amp', '0'); return; }
    orbRafId = requestAnimationFrame(step);
    analyserNode.getByteFrequencyData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i];
    const avg = (sum / data.length) / 255;
    orbCore.style.setProperty('--amp', avg.toFixed(3));
  };
  step();
}

// ─── Sending messages (shared by voice, text, and topic chips) ────────────────
async function sendUserMessage(text) {
  hideTopics();
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  trimHistory();

  try {
    const reply = await callChat(history);
    addMsg('teacher', reply);
    history.push({ role: 'assistant', content: reply });
    trimHistory();
    await playTTS(reply);
  } catch (err) {
    console.error('sendUserMessage error:', err);
    showToast('Something went wrong. Please try again.');
    setState('idle');
  }
}

// ─── Text input ────────────────────────────────────────────────────────────────
function handleSendText() {
  if (appState !== 'idle') return;
  const val = textInput.value.trim();
  if (!val) return;
  textInput.value = '';
  sendUserMessage(val);
}

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); handleSendText(); }
});

// ─── Topic chips ──────────────────────────────────────────────────────────────
async function pickTopic(btn) {
  if (appState !== 'idle') return;
  const topic = btn.textContent.trim();
  await sendUserMessage(`I'd like to practise: ${topic}`);
}

function hideTopics() {
  if (!topicsGone) { topicsRow.style.display = 'none'; topicsGone = true; }
}

// ─── Message helpers ──────────────────────────────────────────────────────────
function addMsg(role, text) {
  const el   = document.createElement('div');
  el.className = `message ${role}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (role === 'teacher') {
    el.innerHTML = `
      <div class="msg-avatar">E</div>
      <div class="msg-col">
        <div class="msg-bubble">${safe(text)}</div>
        <div class="msg-meta">Emma · ${time}</div>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="msg-bubble">${safe(text)}</div>
      <div class="msg-meta">You · ${time}</div>`;
  }

  messagesEl.appendChild(el);
  scrollDown();
}

function scrollDown() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

function safe(t) {
  return t
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function trimHistory() {
  if (history.length > 16) history = history.slice(history.length - 16);
}

// ─── Keyboard shortcut: Space to toggle record ────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  if (document.activeElement?.tagName === 'INPUT') return;
  if (mode !== 'voice') return;
  e.preventDefault();
  toggleRecord();
});

// ─── Go ───────────────────────────────────────────────────────────────────────
applyMode();
init();
</script>
</body>
</html>
